version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leetcode-recommender
    restart: unless-stopped
    env_file:
      - .env.local        # place your secrets here (never commit this file)
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # mount SSL certs here (optional)
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
